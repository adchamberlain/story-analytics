name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Desktop App (Apple Silicon)
        - macOS Desktop App (Intel)
        - Web (Cloud)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly. What did you see?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Every time
        - Sometimes
        - Happened once
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Screenshots, chart type, data source, or anything else that might help.
    validations:
      required: false
